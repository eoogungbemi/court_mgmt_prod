# ── Allegheny County Juvenile Court — Nginx Production Config ─────────────────
#
# Replace every occurrence of "court.example.com" with your actual domain
# before deploying.  Cert paths follow the standard Let's Encrypt layout.
#
# First-run certificate issue (before this config is active):
#   docker compose -f docker-compose.prod.yml run --rm certbot certonly \
#     --webroot -w /var/www/certbot \
#     -d court.example.com --email admin@example.com --agree-tos --no-eff-email

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile    on;
  tcp_nopush  on;
  tcp_nodelay on;

  keepalive_timeout 65;

  gzip            on;
  gzip_types      text/plain text/css application/json application/javascript
                  text/xml application/xml text/javascript;
  gzip_min_length 1000;

  # Rate limiting — protect login endpoint
  limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

  # ── HTTP: redirect to HTTPS + serve certbot challenge ──────────────────────
  server {
    listen 80;
    server_name court.example.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS ──────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2  on;
    server_name court.example.com;

    ssl_certificate     /etc/letsencrypt/live/court.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/court.example.com/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss://$host; font-src 'self'; frame-ancestors 'none';" always;

    client_max_body_size 10M;  # allow bulk-upload spreadsheets

    # ── Backend API ──────────────────────────────────────────────────────────
    location /api/ {
      proxy_pass         http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    # Rate-limit login attempts
    location /api/auth/login {
      limit_req zone=login burst=5 nodelay;
      proxy_pass         http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Backend health check (ops access)
    location /health {
      proxy_pass       http://backend:8000;
      proxy_set_header Host $host;
    }

    # Prometheus metrics — internal scraper only, never exposed publicly
    location /api/metrics {
      allow 172.16.0.0/12;   # Docker bridge networks
      allow 10.0.0.0/8;
      allow 127.0.0.1;
      deny  all;
      proxy_pass         http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
    }

    # ── Next.js frontend ─────────────────────────────────────────────────────
    location / {
      proxy_pass         http://frontend:3000;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      # WebSocket support (Next.js HMR / future WS endpoint)
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
    }
  }
}
