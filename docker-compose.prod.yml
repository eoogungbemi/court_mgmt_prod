name: court-mgmt-prod

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  10
    # No port exposure in production — accessible only via internal network

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    # No port exposure — internal network only

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      ENVIRONMENT: production
      REDIS_URL:   redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:     ["CMD-SHELL", "curl -fsS http://localhost:8000/health | grep -q '\"status\"'"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 30s
    # No direct port exposure — Nginx proxies /api/*

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      INTERNAL_API_URL: http://backend:8000
      JWT_SECRET:       ${SECRET_KEY}
      NODE_ENV:         production
    depends_on:
      backend:
        condition: service_healthy
    # No direct port exposure — Nginx proxies everything else

  # ── Nginx (SSL termination + reverse proxy) ─────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

  # ── Certbot (auto-renew Let's Encrypt every 12 h) ──────────────────────────
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Attempt renewal every 12 hours; certbot skips if cert is still valid
    entrypoint: >
      /bin/sh -c "trap exit TERM;
                  while :; do
                    certbot renew --webroot -w /var/www/certbot --quiet;
                    sleep 12h & wait $${!};
                  done"

volumes:
  pgdata:
  redis_data:
  certbot_www:
  certbot_certs:
