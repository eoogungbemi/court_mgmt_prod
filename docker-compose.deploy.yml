# Self-contained production stack — used by deploy.sh
# Caddy handles SSL automatically via Let's Encrypt (no manual cert steps).
# All secrets come from .env (generated by deploy.sh on first run).
#
# Do not run this file directly; use: ./deploy.sh --court NAME --domain D --ip IP

name: court

services:

  # ── Caddy (SSL termination + reverse proxy) ─────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data          # persists certificates across restarts
      - caddy_config:/config
    networks: [internal]
    depends_on: [frontend, backend]

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-court_mgmt}
      POSTGRES_USER:     ${POSTGRES_USER:-court}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-court} -d ${POSTGRES_DB:-court_mgmt}"]
      interval: 10s
      timeout:  5s
      retries:  10
    networks: [internal]

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    networks: [internal]

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      ENVIRONMENT: production
      REDIS_URL:   redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:     ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 40s
    networks: [internal]

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      INTERNAL_API_URL:          http://backend:8000
      JWT_SECRET:                ${SECRET_KEY}
      NODE_ENV:                  production
      NEXT_PUBLIC_COURT_NAME:    ${COURT_DISPLAY_NAME:-Court Case Management}
    depends_on:
      backend:
        condition: service_healthy
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  redis_data:
  caddy_data:
  caddy_config:
