name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint + migrate + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       court_mgmt_test
          POSTGRES_USER:     court
          POSTGRES_PASSWORD: court
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U court -d court_mgmt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL:      postgresql://court:court@localhost:5432/court_mgmt_test
      TEST_DATABASE_URL: postgresql://court:court@localhost:5432/court_mgmt_test
      SECRET_KEY:        ci-test-secret
      ENVIRONMENT:       test
      ANTHROPIC_API_KEY: ""   # agents fall back to rule-based in tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Audit Python dependencies for CVEs
        run: pip-audit --requirement requirements.txt --progress-spinner off

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -v --tb=short

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — install + type-check + build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies for CVEs
        run: npm audit --audit-level=high

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          JWT_SECRET:          ci-test-secret

  # ── Docker build smoke test ───────────────────────────────────────────────
  docker:
    name: Docker — build both images
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t court-backend ./backend

      - name: Build frontend image
        run: docker build -t court-frontend ./frontend

  # ── Playwright E2E ───────────────────────────────────────────────────────────
  e2e:
    name: E2E — Playwright (Chromium)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for E2E stack
        run: |
          cat > .env <<'EOF'
          SECRET_KEY=ci-e2e-secret-32-chars-minimum-ok
          ANTHROPIC_API_KEY=
          REDIS_URL=redis://redis:6379/0
          EOF

      - name: Start Docker Compose stack
        run: docker compose up -d --build

      - name: Wait for backend to be healthy
        run: |
          timeout 90 bash -c \
            'until curl -fsS http://localhost:8000/health | grep -q "\"status\""; do sleep 3; done'

      - name: Seed base data and demo docket
        run: |
          docker compose exec -T backend python db/seed.py
          docker compose exec -T backend python db/demo_seed.py

      - name: Wait for frontend to be ready
        run: |
          timeout 120 bash -c \
            'until curl -fsS -o /dev/null -w "%{http_code}" http://localhost:3000/ | grep -qE "^(200|302|307)$"; do sleep 5; done'

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and Playwright browsers
        working-directory: frontend
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
